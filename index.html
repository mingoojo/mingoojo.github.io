<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="default.css">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <style>
        body{
            background-color: #f4f7fc;
            height: 200vh;

        }
        .header{
            background-color: white;
            width: 92vw;
            height: 3.5rem;
            margin: 0px 4vw;
            border-radius: 0px 0px 15px 15px;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0px 0px 20px 10px #cad8f0;
            transition: all 0.3s;   
        }

        .logo{
            background-image: url(images/icon/main-logo-01.png);
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            height: 3rem;
            width: 3rem;
            flex: 0 0 auto;
            margin-left: 2rem;
        }


        .test {
            display: inline-block;
            flex: 1 1 auto;
        }
        .menu-bar1{
            text-align: center;
            /* transform: translateY(-50%); */
            opacity: 0;
            display: none;
            /* border: 2px solid #222; */
        }
        .menu-bar2{
            text-align: center;
            /* transform: translateY(-50%); */
            opacity: 0;
            display: none;
            /* border: 2px solid #222; */
        }
        .menu-bar3{
            text-align: center;
            /* transform: translateY(-50%); */
            opacity: 0;
            display: none;
            /* border: 2px solid #222; */
        }
        .menu-bar-contents{
            display: inline;
            margin: 0 1rem;
            /* border: 2px solid #222; */
        }
        .menu-bar-btn{
            background-color: rgb(71, 71, 216);

        }
        .btn-cover{
            margin-right: 2rem;
            flex: 0 0 auto;
            /* border: 2px solid #222; */
        }

        .showen{
            transform: translateY(0%);
            opacity: 1;
            display: block;
            animation: ani-test 0.35s forwards;
        }
        .showen2{
            transform: translateY(0%);
            opacity: 1;
            display: block;
            animation: ani-test2 0.35s forwards;
        }

        @keyframes ani-test {
            0%{
                transform: translateX(-5%);
                opacity: 0;
            }
            100%{
                transform: translateY(0%);
                opacity: 1;
            }
        }

        @keyframes ani-test2 {
            0%{
                transform: translateX(5%);
                opacity: 0;
            }
            100%{
                transform: translateY(0%);
                opacity: 1;
            }
        }
        .butn{
            position: absolute;
            z-index: 110;
            /* background-color: beige; */
            /* border: 2px solid #222; */
            width : 3rem;
            text-align: center;
            font-weight: bold;
            font-size: 2rem;
            cursor: pointer;
            
        }
        .butn1{
            /* top: -0.3rem; */
            transform: translate(68vw, 0px); 
            /* transform: translateY(1rem); */
        }

        .butn2{
            /* top: -0.3rem; */
            transform: translate(22.5vw, 0px);
            /* transform: translateY(1rem); */
        }

        .menu-btn-event{
            background-color: aquamarine;
            display: block; 
            background-color: aquamarine;
            transform: translate(-90%, 0%); 
            position: absolute; 
            width: 0px; 
            height: 0px;
            transition: all 0.35s;
            
            
        }
        input[id="chkbox"]:checked + label + div{
            background-color: bisque;
            width: 300px; 
            height: 300px;
            border-radius: 10px;
       }

       input[id="chkbox"] + label{
        display: block;
        width: 20px;
        height: 17px;
        position: relative;
        cursor: pointer;
       }
       input[id="chkbox"] + label span{
        display: block;
        position: absolute;
        width: 100%;
        height: 2px;
        border-radius: 100px;
        background-color: rgb(67, 67, 67);
        transition: all 0.35s;
        
       }

       input[id="chkbox"] + label span:nth-child(1){top: 0;}
       input[id="chkbox"] + label span:nth-child(2){top: 50%; transform: translateY(-50%);}
       input[id="chkbox"] + label span:nth-child(3){bottom: 0;}
       input[id="chkbox"]:checked + label span:nth-child(1){top: 50%; transform: translateY(-50%) rotate(45deg);}
       input[id="chkbox"]:checked + label span:nth-child(2){opacity: 0;}
       input[id="chkbox"]:checked + label span:nth-child(3){bottom: 50% ;transform: translateY(50%) rotate(-45deg);}
    </style>
</head>
<body>
    <nav class="header">
        <div class="logo"></div>


        <div class="test">
            <div class="test menu-bar1 showen" style="transition: all 0.2s">
                <li class="menu-bar-contents">
                    <a href="#">Home</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Resume</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Project</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Github</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Coding Journal</a>
                </li>
            </div>
            <div class="test menu-bar2" style="transition: all 0.2s">
                <li class="menu-bar-contents">
                    <a href="#">Git</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">SNS</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">E-mail</a>
                </li>
                <!-- <li class="menu-bar-contents">
                    <a href="#">Github</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Coding Journal</a>
                </li> -->
            </div>
            <div class="test menu-bar3" style="transition: all 0.2s">
                <li class="menu-bar-contents">
                    <a href="#">Copy@right</a>
                </li>
                <!-- <li class="menu-bar-contents">
                    <a href="#">Resume</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Project</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Github</a>
                </li>
                <li class="menu-bar-contents">
                    <a href="#">Coding Journal</a>
                </li> -->
            </div>
        </div>

        <div class="test btn-cover">
            <div class="menu-btn">
                <div class="menu-btn-all">
                    <input type="checkbox" id="chkbox" style="display: none;">
                    <label for="chkbox" class="btn-main">
                        <span></span>
                        <span></span>
                        <span></span>
                    </label>
                    <div class="menu-btn-event">
                    </div> 
                </div> 
            </div>
        </div>            
            <div class="butn2 butn"> « </div>
            <div class="butn1 butn"> » </div>
    </nav>
    
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script>

        let foo2 = [];

        window.addEventListener('scroll', function(){
            foo2.unshift(window.scrollY);

            if(foo2[0]>foo2[1]){
                document.querySelector('.header').style.top = '-20rem'
            } else if (foo2[0]<foo2[1]){
                document.querySelector('.header').style.top = '0rem'
            }
        })

        var foo = 0;

        document.querySelector('.butn1').addEventListener('click', ()=>{
            foo +=1;
            console.log(foo)
            if(foo%3 == 0){
            document.querySelector('.menu-bar1').classList.add('showen2');
            document.querySelector('.menu-bar1').classList.remove('showen');
            document.querySelector('.menu-bar2').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.remove('showen');
            document.querySelector('.menu-bar3').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen');
        } else if (foo%3 == 1 || foo%3 == -1){
            document.querySelector('.menu-bar1').classList.remove('showen2');
            document.querySelector('.menu-bar1').classList.remove('showen');
            document.querySelector('.menu-bar2').classList.remove('showen');
            document.querySelector('.menu-bar2').classList.add('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen');
        } else if (foo%3 == 2 || foo%3 == -2){
            document.querySelector('.menu-bar1').classList.remove('showen2');
            document.querySelector('.menu-bar1').classList.remove('showen');
            document.querySelector('.menu-bar2').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.remove('showen');
            document.querySelector('.menu-bar3').classList.remove('showen');
            document.querySelector('.menu-bar3').classList.add('showen2');
        }
        })
        document.querySelector('.butn2').addEventListener('click', ()=>{
            foo -=1;
            console.log(foo)
            if(foo%3 == 0){
            document.querySelector('.menu-bar1').classList.add('showen');
            document.querySelector('.menu-bar1').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.remove('showen');
            document.querySelector('.menu-bar3').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen');
        } else if (foo%3 == 1 || foo%3 == -1){
            document.querySelector('.menu-bar1').classList.remove('showen');
            document.querySelector('.menu-bar1').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.add('showen');
            document.querySelector('.menu-bar2').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen');
            document.querySelector('.menu-bar3').classList.remove('showen2');
        } else if (foo%3 == 2 || foo%3 == -2){
            document.querySelector('.menu-bar1').classList.remove('showen');
            document.querySelector('.menu-bar1').classList.remove('showen2');
            document.querySelector('.menu-bar2').classList.remove('showen');
            document.querySelector('.menu-bar2').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.remove('showen2');
            document.querySelector('.menu-bar3').classList.add('showen');
        }
        })
    </script>
</body>
</html>
